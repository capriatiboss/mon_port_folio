<svg width="200" height="280" viewBox="0 0 100 140" xmlns="http://www.w3.org/2000/svg">
    <style>
        /* Styles intégrés au SVG */
        .silhouette {
            fill: none;
            stroke: #00d2ff;
            stroke-width: 2;
        }
        .heart {
            fill: #660000;
            filter: drop-shadow(0 0 10px rgba(255, 0, 0, 0.3)) 
                    drop-shadow(0 0 5px rgba(255, 0, 0, 0.6));
            animation: beat 1.2s infinite ease-in-out;
            transform-origin: center;
        }
        @keyframes beat {
            0%, 100% { 
                transform: scale(1);
                filter: drop-shadow(0 0 10px rgba(255, 0, 0, 0.3));
            }
            50% { 
                transform: scale(1.15);
                filter: drop-shadow(0 0 15px rgba(255, 0, 0, 0.8))
                        drop-shadow(0 0 25px rgba(255, 0, 0, 0.4));
            }
        }
    </style>
    
    <!-- Silhouette du torse -->
    <path class="silhouette" d="M50 10 C35 10 25 25 25 40 C25 60 40 65 50 65 C60 65 75 60 75 40 C75 25 65 10 50 10 Z" />
    <path class="silhouette" d="M20 100 C20 80 30 70 50 70 C70 70 80 80 80 100" />
    
    <!-- Cœur sombre -->
    <path class="heart" d="M50 48 C48 45 42 45 42 50 C42 55 50 60 50 60 C50 60 58 55 58 50 C58 45 52 45 50 48 Z" />
    
    <!-- Cercle décoratif -->
    <circle cx="50" cy="50" r="45" fill="none" stroke="#00d2ff" stroke-width="0.5" stroke-dasharray="4 2" />
    
    <!-- Texte "MOI" -->
</svg>
