        function commande(age){
        return new Promise((resolve,reject)=>{
            console.log("Patientez nous vérifions votre age");
            setTimeout(()=>{
            if(age>=18){
                resolve("Bienvenue");
            }
            else{
                reject("Vous etes mineur");
            }},2000)
        })
     }
     function genre(sexe){
        return new Promise((resolve,reject)=>{
            setTimeout(()=>{
                if(sexe==="m"){
                    resolve("Bienvenue");
                }
                else{
                    reject("Vous etes une femme");
                }
            },4000)
        })
     }

     bouton.addEventListener("click", async function(){
        age =+document.getElementById("age").value;
        sexe = document.getElementById("sexe").value;
        console.log(age);
        try{
        const messageAge = await commande(age);
        console.log(messageAge+" maintenant passons à la deuxième étape");
        console.log("Immediatement apres le premier await");
        const messageGenre= await genre(sexe);
