<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESGIS - Ultra Dynamic Background</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505; /* Fond ultra noir */
        }

        #canvas-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
        }

        /* Overlay pour donner du style "Interface" */
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.4) 100%);
            border: 1px solid rgba(227, 6, 19, 0.1);
            z-index: 10;
        }

        /* Texte en avant-plan optionnel */
        .content {
            position: absolute;
            z-index: 20;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 5px;
            opacity: 0.5;
            bottom: 50px;
        }
    </style>
</head>
<body>

    <div id="canvas-container">
        <canvas id="particle-canvas"></canvas>
        <div class="ui-overlay"></div>
        <div class="content">E S G I S &nbsp; D I G I T A L &nbsp; E X P E R I E N C E</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouse = { x: null, y: null, radius: 100 };

        const image = new Image();
        // C'est ici qu'on charge ton logo
        image.src = 'téléchargement.jfif'; 

        image.onload = function() {
            init();
            animate();
        };

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });

        class Particle {
            constructor(x, y, color, originX, originY) {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.originX = originX;
                this.originY = originY;
                this.color = color;
                this.size = 1.5;
                this.density = (Math.random() * 30) + 1;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }

            update() {
                // Mouvement par rapport à la souris
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                let forceDirectionX = dx / distance;
                let forceDirectionY = dy / distance;
                let maxDistance = mouse.radius;
                let force = (maxDistance - distance) / maxDistance;
                let directionX = forceDirectionX * force * this.density;
                let directionY = forceDirectionY * force * this.density;

                if (distance < mouse.radius) {
                    this.x -= directionX;
                    this.y -= directionY;
                } else {
                    if (this.x !== this.originX) {
                        let dx = this.x - this.originX;
                        this.x -= dx / 15;
                    }
                    if (this.y !== this.originY) {
                        let dy = this.y - this.originY;
                        this.y -= dy / 15;
                    }
                }
            }
        }

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // On dessine temporairement l'image pour scanner les pixels
            const tempWidth = 400; // Taille du logo dans le canvas
            const tempHeight = image.height * (tempWidth / image.width);
            const centerX = (canvas.width - tempWidth) / 2;
            const centerY = (canvas.height - tempHeight) / 2;

            ctx.drawImage(image, centerX, centerY, tempWidth, tempHeight);
            const data = ctx.getImageData(centerX, centerY, tempWidth, tempHeight);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            particles = [];
            // On scanne l'image et on crée une particule pour chaque pixel non-transparent
            for (let y = 0, y2 = data.height; y < y2; y += 4) {
                for (let x = 0, x2 = data.width; x < x2; x += 4) {
                    if (data.data[(y * 4 * data.width) + (x * 4) + 3] > 128) {
                        let positionX = x + centerX;
                        let positionY = y + centerY;
                        let color = `rgb(${data.data[(y * 4 * data.width) + (x * 4)]}, 
                                         ${data.data[(y * 4 * data.width) + (x * 4) + 1]}, 
                                         ${data.data[(y * 4 * data.width) + (x * 4) + 2]})`;
                        particles.push(new Particle(positionX, positionY, color, positionX, positionY));
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            
            // Effet de lignes entre les particules proches (optionnel pour le style "Tech")
            connect();
            requestAnimationFrame(animate);
        }

        function connect() {
            // Optionnel : Ajoute des lignes si tu veux un effet réseau
            // Pour ESGIS, on reste sur les pixels pour garder la netteté du logo
        }

        window.addEventListener('resize', () => {
            init();
        });
    </script>
</body>
</html>
