<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Météo IA - Riaz Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            background: #0f172a;
        }

        .div_parent {
            background: linear-gradient(-45deg, #0f172a, #1e40af, #0891b2, #1d4ed8);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            width: 100%;
            height: 100vh;
            display: grid;
            place-content: center;
            position: relative; /* Pour positionner la signature par rapport au parent */
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Conteneur principal */
        #div_enfant {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            width: 350px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 {
            color: white;
            margin: 0;
            font-size: 1.5rem;
            letter-spacing: 1px;
            font-weight: 600;
        }

        #ville {
            background: rgba(255, 255, 255, 0.95);
            border: none;
            border-radius: 15px;
            padding: 15px;
            width: 90%;
            font-size: 1rem;
            outline: none;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        #para {
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.95rem;
            line-height: 1.6;
            min-height: 60px;
            font-weight: 300;
        }

        button {
            background: #ffffff;
            color: #1e40af;
            border: none;
            border-radius: 50px;
            padding: 14px 40px;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        button:hover {
            transform: scale(1.05);
            background: #1e40af;
            color: white;
        }

        button:active {
            transform: scale(0.95);
        }

        /* --- SIGNATURE RIAZ --- */
        .signature {
            position: absolute;
            bottom: 30px;
            right: 40px;
            color: white;
            font-size: 0.8rem;
            letter-spacing: 2px;
            opacity: 0.7;
        }

        .signature span {
            font-weight: 600;
            text-transform: uppercase;
            border-bottom: 2px solid #0891b2;
            padding-bottom: 2px;
        }
    </style>
</head>
<body>
     <div class="div_parent">
         <div id="div_enfant">
              <h1>Météo Intelligente</h1>
              <input type="text" id="ville" placeholder="Entrez une ville...">
              <p id="para">Prêt à découvrir le temps qu'il fait ?</p>
              <button>Vérifier</button>
         </div>

         <div class="signature">Design by <span>Riaz</span></div>
     </div>

    <script type="importmap">
        {
            "imports":{
                "openai":"https://esm.run/openai"
            }
        }
    </script>
    
    <script type="module">
        // TON SCRIPT ORIGINAL (Non modifié)
        const bouton =document.querySelector("button");
        var para = document.getElementById("para");
        import OpenAI from "openai";

        const client = new OpenAI({
            apiKey: "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",
            baseURL: "https://api.groq.com/openai/v1",
            dangerouslyAllowBrowser: true, 
        });

        var history_=[{role:"systeme",content:"Tu es une IA ameliorer par Riaz et ton job est de donnée des donnees métérologiques fiables"}];
         
        async function moi(){    
            try{
                var ville =document.getElementById("ville").value;
                var apiKeyMeteo = "4a712c18bcee825e5e40393518cc3ec7";

                const urlMeteo =`https://api.openweathermap.org/data/2.5/weather?q=${ville}&units=metric&lang=fr&appid=${apiKeyMeteo}`;
                bouton.disabled =true;
                para.innerHTML = "Patientez";
                var ReponseBrut = await fetch(urlMeteo);
                if(!ReponseBrut.ok){
                    bouton.disabled =false;
                    throw new Error("Un problème avec votre cle ou votre ville");
                }

                var data = await ReponseBrut.json();
                var donneesMeteo ={
                    city:ville,    
                    temperature : data.main.temp,
                    humidite : data.main.humidity,
                    vitesseVent : data.wind.speed,
                    rafales : data.wind.gust,
                    tempsActuel : data.weather[0].main,
                    visibilite : data.visibility,
                    nuages : data.clouds.all,
                }
                para.textContent ="En cours de traitement par l'IA";
                
                const response = await client.responses.create({
                    model: "openai/gpt-oss-20b",
                    input:`En te referant aux données suivantes ${JSON.stringify(donneesMeteo)} Tu donneras des informations relatives a la météo soit amicale et precis dans tes données et je veux juste un petit paragraphe qui resume tout sans astéris soit courtois pays Et surtout n'oublie pas d'etre court Ca serait cool si tu pouvais aussi y ajouter des emojis et ne vouvoie PAS et donne une ou deux conseils `,
                });
                history_.push(response.output_text);
                var answer = response.output_text;
                para.textContent=answer; 
                bouton.disabled =false;
                document.getElementById("ville").value="";
            }
            catch(err){
                console.error(err);
                para.innerText = "Erreur de connexion ou ville inconnue.";  
                bouton.disabled = false;
            }
       }
        bouton.addEventListener("click", moi);
    </script>
</body>
</html>
