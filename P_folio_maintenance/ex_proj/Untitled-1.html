<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire simple</title>
    <style>
        *{
            margin: 0;

        }
        body{
           font-family: ink free;
           font-weight: bold;

        }
        .div_parent{
             display: flex;
             flex-direction: column;
             gap:10px;
             justify-content: center;
             align-items: center;

             div{
                border:1px solid black;
                border-radius: 3px;
                padding: 5px;
                width: 50%;
                 input{
                    border-radius:4px ;
                    border: none;

                 }
             }

             #validez{
                width: 30%;
             }
        }
        #fond_arriere{
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -10;
            background-color: rgb(201, 139, 115);
        }
        fieldset{
            border: 5px solid rgb(12, 82, 10);
        }
    </style>
</head>
<body>
    <div id="fond_arriere"></div>
    <h1>Exemple de Formulaire</h1>

    <form action="POST">
        <fieldset>
            <legend><h1>Infos</h1></legend>
            <div class="div_parent">
                  <div>
                       <label for="nom">Entez votre nom</label><br>
                       <input type="text" name="" id="nom">
                  </div>
                  <div>
                      <label for="prenom">Entrez votre prenom</label><br>
                      <input type="text" name="" id="">
                  </div>
                  <div>
                       <label for="age">Entrez votre age</label><br>
                       <input type="text" name="" id="age">
                  </div>
                  <div>
                      <label for="origin">Ètes vous originaire du Bénin?</label><br>
                      <input type="radio" name="oui" id="oui"><br>
                      <input type="radio" name="non" id="non"><br>
                  </div>
                  <div>
                       <label for="profession">Entrez votre profession </label><br>
                       <input type="text" name="" id="profession"><br>
                  </div>
                  <div>
                       <label for="tel">Entrez votre numero de téléphone</label><br>
                       <input type="tel" name="" id="tel"><br>
                  </div>
                  <div>
                       <label for="mail">Entrez votre adresse email</label><br>
                       <input type="mail" name="" id="" required><br>
                  </div>      
      
                  <input type="submit" id="validez" value="Envoyez">
            </div>          
        </fieldset>
    </form>
    <script>
const { GoogleGenerativeAI } = require("@google/generative-ai");

// Mets ta clé ici
const genAI = new GoogleGenerativeAI("AIzaSyC1uJ5r18d3z1CpmA-l0jk-fu5dzGSMfHk");

async function run() {
  try {
    // On utilise 'gemini-pro', c'est le nom le plus stable
    const model = genAI.getGenerativeModel({ model: "gemini-3-flash-preview" });

    const prompt = "Bonjour, est-ce que tu m'entends ?";

    console.log("Tentative de connexion...");
    const result = await model.generateContent(prompt);
    const response = await result.response;
    console.log("Succès ! Réponse :");
    console.log(response.text());
    
  } catch (error) {
    console.log("Erreur détectée :");
    // On affiche l'erreur détaillée pour comprendre
    console.error(error.message);
  }
}

run();
    </script>
</body>
</html>
