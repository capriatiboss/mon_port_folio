<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Gemini</title>
    <style>
        body{
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgba(15, 125, 189, 0.918);

        }
        #div_par{
            padding: 15px;
            position: relative;
            width: 80%;
            min-height:90%;
            border: solid;
            border-radius:10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background: linear-gradient(rgb(30, 120, 148),rgb(24, 109, 81),rgb(26, 70, 42));
            #div1{
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                width: 80%;
                gap: 10px;
            }
        }
        #ville{
            display: flex;
            align-items: center;
            border: none;
            height: 40px;
            width: 65%;
            border-radius: 8px;
            font-size: 22px;
            font-weight: bold;
        }
        #monBouton{
            font-size: 15px;
            font-style: italic;
            background: linear-gradient(rgb(12, 88, 64),rgb(22, 116, 119),rgb(27, 43, 27));
            height: 30px;
            width: 25%;
            color: bisque;
            border-radius:3px ;
        }
        #resultat{
            font-size: 20px;
            color: azure;
            font-family: ink free;
            font-weight: bold;


        }
    </style>
</head>
<body>
    <h1>Météo By Riaz propulsé par Gemini</h1>
    <div id="div_par">
        <h2>Entrez le nom d'une ville ou région</h2>
        <div id="div1">
          <input type="text" name="" id="ville">
          <button id="monBouton">Envoyez</button>
        </div>  
       <div id="resultat"></div>
   </div>
    <script type="importmap">
    {
      "imports": {
        "@google/generative-ai": "https://esm.run/@google/generative-ai"
      }
    }
    </script>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";
        const genAI = new GoogleGenerativeAI("AIzaSyAlgI21N4qlFm0SiDuL8RoZQn54e5Jc8KA");

        async function run() {
            let ville = document.getElementById("ville").value;
            console.log(ville);
            const bouton = document.querySelector("#monBouton");
            const rendu = document.querySelector("#resultat");

            var Appi_KEY="4a712c18bcee825e5e40393518cc3ec7";
            var url =`https://api.openweathermap.org/data/2.5/weather?q=${ville}&units=metric&lang=fr&appid=${Appi_KEY}`;
            rendu.innerText ="Traitement en cours..."
            console.log("Traitement en cours");
             try {
                 bouton.disabled = true;
                 var reponseBrut=await fetch(url);

                 if(!reponseBrut.ok){
                     throw new Error("Ville ou Appikey invalide");
                 }
                 var data =await reponseBrut.json();
                  var temperature = data.main.temp;
                  var humidite = data.main.humidity;
                  var vitesseVent = data.wind.speed;
                  var rafales = data.wind.gust;
                  var tempsActuel = data.weather[0].main;
                  var pays = data.sys.country;
                  var visibilite = data.visibility;
                  var nuages = data.clouds.all;
     
                 
                 rendu.innerText = "Merci de patienter...";

           
                // Initialisation du modèle avec l'expert (System Instruction)
                const model = genAI.getGenerativeModel({ 
                    model: "gemini-3-flash-preview",
                    systemInstruction: "Tu es un expert en donnée métérologique et tu utilises des données que tu as reçus.De plus tu dois etre direct concis et objectif dans tes propos"
                });

                const prompt = `En t'appuyant sur les donnes suivantes:${temperature} ${humidite} ${vitesseVent} ${rafales} ${tempsActuel} ${pays} ${visibilite} et ${nuages} essaie de faire un breafing sur la météo et donne un ou deux courts conseils et aussi soit plus amical et n'utilise pas * C'est tres mauvais De plus mets le pays en toute lettre`;

                const result = await model.generateContent(prompt);
                const response = await result.response;
                rendu.innerText = response.text();
                
            } catch (error) {
                console.error(error);
                rendu.innerText = "Erreur : " + error.message;
            } finally {
                bouton.disabled = false;
            }
        }

        document.querySelector("#monBouton").addEventListener("click", run);
    </script>
</body>
</html>
