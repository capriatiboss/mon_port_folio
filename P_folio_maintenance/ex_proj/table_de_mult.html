<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table de muliplication</title>
    <style>
           body{
            height: 100vh;
            font-family: ink free;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
           }

           .div_para{
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            min-height: 40%;
            width: 40%;
            background: linear-gradient(rgb(154, 225, 247),rgb(87, 201, 176),rgb(92, 129, 253));
            border-radius: 10px;
            padding: 2%;
           }
           input{
            font-family: ink free;
            font-size: 110%;
            font-weight: bold;
            border-radius:3px;
            background-color: bisque;
            border: 1px solid;
            height: 30px;      
          }
          #bouton{
            background-color: rgb(14, 174, 179);
            border: 1px solid;
            border-radius: 4px;;
            height: 25px;
            font-family: ink free;
            font-weight: bold;
            font-size: 110%;
            }
            #titre{
              align-self: flex-start;
            }
    </style>
</head>
<body>
  <h1 id="titre">Table de multipication by Riaz</h1>
  <div class="div_para">
      <label><h2>Entrez un nombre</h2></label>
      <input type="number" id="nombre">
      <button id="bouton">cliquez</button>
      <div id="divaff"></div>
  </div> 
  <input type="number" required id="max" placeholder="Entrez nombre de muliplication" min=0 max=20>   
      <script>
            var bouton =document.getElementById("bouton");
            var divpara =document.getElementById("div_para");

            bouton.addEventListener("click",()=>{
            div = document.getElementById("divaff");  
              var nombre =+document.getElementById("nombre").value;
              var max = document.getElementById("max");
              if(max.validity.valueMissing){
                max=10;
                console.log(max)
                console.log(typeof(max));
              }
              else{
              max= +max.value;
              }
              let i =0;p="";
              while(i<=max){
              p+=nombre+"x"+i+"="+nombre*i+"<br/>";
              i++
              }
              div.innerHTML =p;
          
          })
             
      </script>
</body>
</html>
